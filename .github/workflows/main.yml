name: Full CI/CD pipeline

on:
  push:
    branches: [main]


jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checking out repository
        uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2


      - name: Set short git commit SHA
        id: vars
        run: echo "COMMIT_SHORT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3


      - name: building  and pushing docker image
        run: |
          docker buildx build \
          --platform linux/amd64,linux/arm64 \
          -t ${{ secrets.ECR_REPO }}:${{ env.COMMIT_SHORT_SHA }} \
          -t ${{secrets.ECR_REPO }}:latest \
          --push .

      - name: Extracting task definition from ECS
        run: |
          aws ecs describe-task-definition \
          --task-definition app-task \
          --query taskDefinition > task-definition.json

      - name: Render ECS task definition
        id: render-task-definition
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: app-container
          image: ${{ secrets.ECR_REPO }}:${{ env.COMMIT_SHORT_SHA }}

      - name: Deploy ECS task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-task-definition.outputs.task-definition }}
          service: app-service
          cluster: app-cluster
          wait-for-service-stability: true


